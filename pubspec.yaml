name: qr_steam
description: >
  A Flutter package for streaming data via animated QR codes using LT fountain codes.
  Inspired by txqr/QRStream. Supports encoding arbitrary binary data (e.g. AVIF images)
  into animated QR code sequences and decoding them via camera.
version: 0.1.0
homepage: https://github.com/example/qr_steam

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
