name: qr_steam
description: >
  A Flutter plugin for streaming binary data via animated QR codes with
  sequential chunks or LT fountain codes. Inspired by txqr/QRStream and suitable
  for camera-based transfer of AVIF images and other payloads.
version: 0.1.0
homepage: https://github.com/ubuntu2204/qr_steam
repository: https://github.com/ubuntu2204/qr_steam
issue_tracker: https://github.com/ubuntu2204/qr_steam/issues

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
